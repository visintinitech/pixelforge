
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PixelForge · Editor Pixel Art</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
  <style>
    /* ========== ESTILO RETRO (base) ========== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }

    body {
      background: #1a1a2e;
      font-family: 'Courier New', Courier, monospace;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      background: #16213e;
      padding: 20px;
      border: 4px solid #0f3460;
      border-radius: 12px;
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
      max-width: 1500px;
      width: 100%;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      border-bottom: 3px solid #0f3460;
      padding-bottom: 10px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .header h1 {
      font-size: 28px;
      color: #00d4ff;
      text-shadow: 0 0 10px #00d4ff88;
      letter-spacing: 3px;
    }

    .header h1 small {
      font-size: 14px;
      color: #8888aa;
      text-shadow: none;
      margin-left: 12px;
    }

    .header-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .header-actions button {
      background: #0f3460;
      border: 2px solid #00d4ff;
      color: #00d4ff;
      padding: 6px 14px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 4px;
      transition: 0.2s;
    }
    .header-actions button:hover {
      background: #00d4ff;
      color: #0f3460;
      box-shadow: 0 0 20px #00d4ff88;
    }

    .main-layout {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .panel {
      background: #1a1a2e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      padding: 12px;
      min-width: 180px;
      flex: 1 1 180px;
    }

    .panel h3 {
      color: #00d4ff;
      font-size: 16px;
      border-bottom: 2px dotted #0f3460;
      padding-bottom: 6px;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-shadow: 0 0 6px #00d4ff66;
    }

    .panel button {
      background: #0f3460;
      border: 1px solid #555577;
      color: #ddd;
      padding: 4px 10px;
      font-family: inherit;
      font-size: 12px;
      cursor: pointer;
      border-radius: 3px;
      margin: 2px 0;
      transition: 0.15s;
    }
    .panel button:hover {
      background: #2a4a7a;
      border-color: #00d4ff;
      color: #fff;
    }

    .tool-group {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-bottom: 10px;
    }

    .tool-group button.active {
      background: #00d4ff;
      color: #0f3460;
      border-color: #00d4ff;
      box-shadow: 0 0 12px #00d4ffaa;
    }

    .brush-size {
      display: flex;
      align-items: center;
      gap: 4px;
      margin: 8px 0;
      flex-wrap: wrap;
    }
    .brush-size button {
      min-width: 28px;
      text-align: center;
      font-size: 11px;
      padding: 2px 6px;
    }
    .brush-size button.active-brush {
      background: #00d4ff;
      color: #0f3460;
      border-color: #00d4ff;
    }

    .color-palette {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      gap: 4px;
      margin: 8px 0;
    }
    .color-swatch {
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid #333355;
      border-radius: 2px;
      cursor: pointer;
      transition: 0.1s;
    }
    .color-swatch:hover {
      transform: scale(1.1);
      border-color: #fff;
    }
    .color-swatch.selected {
      border: 3px solid #ffffff;
      box-shadow: 0 0 12px #00d4ff;
    }

    .color-picker-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
    }
    .color-picker-wrap input[type="color"] {
      width: 40px;
      height: 40px;
      border: 2px solid #555577;
      background: none;
      cursor: pointer;
    }
    .color-picker-wrap span {
      font-size: 13px;
      color: #aaa;
    }

    .canvas-wrapper {
      background: #0a0a1a;
      border: 4px solid #0f3460;
      border-radius: 8px;
      padding: 8px;
      flex: 0 0 auto;
      box-shadow: 0 0 30px #00000066;
      position: relative;
    }
    #mainCanvas {
      display: block;
      width: 512px;
      height: 512px;
      image-rendering: pixelated;
      background: #222;
      cursor: crosshair;
    }

    /* Capas */
    .layer-list {
      max-height: 160px;
      overflow-y: auto;
      margin: 6px 0;
    }
    .layer-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 6px;
      background: #0f1a2e;
      margin: 2px 0;
      border-radius: 3px;
      font-size: 13px;
      border-left: 3px solid transparent;
      cursor: pointer;
    }
    .layer-item.active {
      border-left-color: #00d4ff;
      background: #1a2a4a;
    }
    .layer-item .layer-vis {
      cursor: pointer;
      font-size: 16px;
      width: 20px;
      text-align: center;
    }
    .layer-item .layer-name {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .layer-item .layer-del {
      cursor: pointer;
      color: #ff6b6b;
      font-weight: bold;
      padding: 0 4px;
    }
    .layer-item .layer-del:hover {
      color: #ff0000;
    }
    .layer-item .layer-type {
      font-size: 10px;
      background: #0f3460;
      padding: 0 6px;
      border-radius: 8px;
      color: #aaa;
    }

    /* Timeline */
    .timeline {
      background: #0a0a1a;
      border-radius: 6px;
      padding: 8px;
      margin-top: 6px;
    }
    .timeline-frames {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 6px 0;
      max-height: 100px;
      overflow-y: auto;
    }
    .frame-thumb {
      background: #1a1a2e;
      border: 2px solid #333355;
      border-radius: 4px;
      padding: 4px;
      text-align: center;
      cursor: pointer;
      min-width: 50px;
      transition: 0.1s;
    }
    .frame-thumb.active {
      border-color: #00d4ff;
      box-shadow: 0 0 16px #00d4ff88;
    }
    .frame-thumb canvas {
      display: block;
      width: 40px;
      height: 40px;
      image-rendering: pixelated;
      background: repeating-conic-gradient(#333 0% 25%, #555 0% 50%) 0 0 / 8px 8px;
      margin: 0 auto;
    }
    .frame-thumb .frame-label {
      font-size: 10px;
      color: #aaa;
      margin-top: 2px;
    }
    .frame-thumb .frame-del {
      color: #ff6b6b;
      cursor: pointer;
      font-size: 12px;
      margin-left: 4px;
    }

    .timeline-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-top: 6px;
    }
    .timeline-controls button {
      background: #0f3460;
      border: 1px solid #555577;
      color: #ddd;
      padding: 3px 10px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      border-radius: 3px;
    }
    .timeline-controls button:hover {
      background: #2a4a7a;
    }
    .timeline-controls input[type="range"] {
      width: 80px;
      background: #333;
      height: 4px;
      border-radius: 2px;
      -webkit-appearance: none;
    }
    .timeline-controls input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: #00d4ff;
      border-radius: 50%;
      cursor: pointer;
    }

    /* Efectos / Capas de ajuste */
    .adjustment-group {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 6px;
    }
    .adjustment-group button {
      font-size: 11px;
      padding: 2px 8px;
    }

    /* Sprite sheet */
    .sprite-options {
      display: flex;
      gap: 6px;
      margin: 6px 0;
      align-items: center;
      flex-wrap: wrap;
    }
    .sprite-options input {
      width: 50px;
      background: #1a1a2e;
      border: 1px solid #555577;
      color: #fff;
      padding: 3px;
      font-family: inherit;
      text-align: center;
    }

    /* Responsive */
    @media (max-width: 1000px) {
      .main-layout {
        flex-direction: column;
        align-items: center;
      }
      .panel {
        width: 100%;
        min-width: unset;
      }
      #mainCanvas {
        width: 320px;
        height: 320px;
      }
    }
  </style>
</head>
<body>

<div class="app" id="app">
  <!-- HEADER -->
  <div class="header">
    <h1>◈ PIXELFORGE <small>retro animation studio</small></h1>
    <div class="header-actions">
      <button id="exportPngBtn">📥 PNG</button>
      <button id="exportGifBtn">🎞️ GIF</button>
      <button id="exportSpriteBtn">🖼️ Sprite Sheet</button>
      <button id="importBtn">📂 Importar</button>
      <input type="file" id="fileInput" accept="image/*" style="display:none" />
      <button id="saveProjectBtn">💾 Guardar proyecto</button>
      <button id="loadProjectBtn">📂 Abrir proyecto</button>
      <input type="file" id="projectInput" accept=".json" style="display:none" />
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-layout">
    <!-- Panel Izquierdo: Herramientas + Capas -->
    <div class="panel" style="flex:1.2;">
      <h3>🛠 Herramientas</h3>
      <div class="tool-group" id="toolGroup">
        <button data-tool="pencil" class="active">✏️ Lápiz</button>
        <button data-tool="eraser">🧹 Borrador</button>
        <button data-tool="fill">🪣 Relleno</button>
        <button data-tool="picker">💉 Cuentagotas</button>
        <button data-tool="select">🔲 Selección</button>
        <button data-tool="pen">🖊️ Lapicera</button>
      </div>

      <div class="brush-size">
        <span style="font-size:13px;">Tamaño:</span>
        <button data-size="1" class="active-brush">1</button>
        <button data-size="3">3</button>
        <button data-size="5">5</button>
        <button data-size="7">7</button>
        <button data-size="9">9</button>
        <button data-size="11">11</button>
        <button data-size="13">13</button>
        <button data-size="15">15</button>
      </div>

      <div style="display:flex;gap:8px;margin:6px 0;flex-wrap:wrap;">
        <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
          <input type="checkbox" id="symmetryH" /> Sim. H
        </label>
        <label style="font-size:13px;display:flex;align-items:center;gap:4px;">
          <input type="checkbox" id="symmetryV" /> Sim. V
        </label>
      </div>

      <h3>🎨 Paleta</h3>
      <div class="color-palette" id="palette"></div>
      <div class="color-picker-wrap">
        <input type="color" id="customColor" value="#ff00ff" />
        <span>color activo</span>
      </div>

      <h3>📚 Capas</h3>
      <div class="layer-list" id="layerList"></div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px;">
        <button id="addLayerBtn">➕ Añadir</button>
        <button id="dupLayerBtn">📋 Duplicar</button>
        <button id="mergeLayerBtn">⬇️ Fusionar visibles</button>
        <button id="upLayerBtn">⬆️ Subir</button>
        <button id="downLayerBtn">⬇️ Bajar</button>
      </div>

      <h3 style="margin-top:12px;">⚡ Capas de ajuste</h3>
      <div class="adjustment-group">
        <button id="adjBrightness">☀️ Brillo</button>
        <button id="adjContrast">🎚️ Contraste</button>
        <button id="adjSaturation">🌈 Saturación</button>
        <button id="adjGrayscale">⚫ Grises</button>
      </div>

      <h3 style="margin-top:12px;">🔄 Efectos (capa activa)</h3>
      <div class="adjustment-group">
        <button id="effectScale2x">2x</button>
        <button id="effectScaleHalf">½</button>
        <button id="effectRot90">↻ 90°</button>
        <button id="effectRot180">↻ 180°</button>
        <button id="effectRot270">↻ 270°</button>
        <button id="effectFlipH">↔ Voltear H</button>
        <button id="effectFlipV">↕ Voltear V</button>
        <button id="effectInvert">◐ Invertir</button>
      </div>
    </div>

    <!-- Lienzo -->
    <div class="canvas-wrapper">
      <canvas id="mainCanvas" width="32" height="32"></canvas>
    </div>

    <!-- Panel Derecho: Timeline + info -->
    <div class="panel" style="flex:1.2;">
      <h3>⏳ Timeline</h3>
      <div class="timeline">
        <div class="timeline-frames" id="timelineFrames"></div>
        <div class="timeline-controls">
          <button id="addFrameBtn">➕ Frame</button>
          <button id="dupFrameBtn">📋 Duplicar</button>
          <button id="delFrameBtn">🗑️ Eliminar</button>
          <button id="playBtn">▶️ Reproducir</button>
          <span style="font-size:12px;color:#aaa;">Vel:</span>
          <input type="range" id="speedSlider" min="50" max="500" value="200" />
          <span id="speedLabel" style="font-size:12px;">200ms</span>
        </div>
      </div>
      <div style="margin-top:12px;font-size:13px;color:#888;">
        <span id="infoCoords">(0,0)</span> · 
        <span id="infoColor">#000</span>
      </div>
      <div style="margin-top:8px;display:flex;gap:6px;flex-wrap:wrap;">
        <button id="undoBtn">↩ Deshacer</button>
        <button id="redoBtn">↪ Rehacer</button>
        <button id="copyBtn">📋 Copiar</button>
        <button id="pasteBtn">📎 Pegar</button>
        <button id="clearSelectionBtn">❌ Limpiar selección</button>
      </div>

      <h3 style="margin-top:12px;">🖼️ Sprite Sheet</h3>
      <div class="sprite-options">
        <span style="font-size:13px;">Columnas:</span>
        <input type="number" id="spriteCols" value="4" min="1" max="10" />
        <button id="exportSpriteBtn2">Exportar</button>
      </div>
    </div>
  </div>
</div>

<script>
  // ============================================================
  //  PIXELFORGE - Todas las funcionalidades ampliadas
  // ============================================================

  (function() {
    'use strict';

    // -------- CONSTANTES --------
    const SIZE = 32;
    const DEF_COLOR = null;          // null = transparente
    const PALETTE = [
      '#000000','#1d2b53','#7e2553','#008751','#ab5236','#5f574f','#c2c3c7','#fff1e8',
      '#ff004d','#ffa300','#ffec27','#00e436','#29adff','#83769c','#ff77a8','#ffccaa'
    ];

    // -------- ESTADO --------
    let state = {
      frames: [],
      currentFrameIndex: 0,
      currentLayerIndex: 0,
      tool: 'pencil',
      color: '#ff00ff',
      brushSize: 1,
      symmetryH: false,
      symmetryV: false,
      history: [],
      historyIndex: -1,
      maxHistory: 20,
      playing: false,
      playTimer: null,
      speed: 200,
      // Selección
      selection: null,      // { startRow, startCol, endRow, endCol, pixels } o null
      isDraggingSelection: false,
      dragOffset: null,
      clipboard: null,     // { pixels, row, col, w, h }
      // Lapicera
      penPoints: [],
      isPenDrawing: false,
    };

    // Referencias DOM
    const canvas = document.getElementById('mainCanvas');
    const ctx = canvas.getContext('2d');
    const layerListEl = document.getElementById('layerList');
    const timelineEl = document.getElementById('timelineFrames');
    const paletteEl = document.getElementById('palette');
    const customColorInput = document.getElementById('customColor');
    const infoCoords = document.getElementById('infoCoords');
    const infoColor = document.getElementById('infoColor');
    const speedSlider = document.getElementById('speedSlider');
    const speedLabel = document.getElementById('speedLabel');
    const symmetryHCheck = document.getElementById('symmetryH');
    const symmetryVCheck = document.getElementById('symmetryV');
    const spriteColsInput = document.getElementById('spriteCols');

    // -------- FUNCIONES AUXILIARES --------

    // Crear capa vacía (normal)
    function createEmptyLayer(name = 'Capa') {
      const pixels = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      return { name, visible: true, pixels, type: 'normal' };
    }

    // Crear capa de ajuste
    function createAdjustmentLayer(type, params = {}) {
      return {
        name: type.charAt(0).toUpperCase() + type.slice(1),
        visible: true,
        type: 'adjustment',
        adjustmentType: type,
        params: params,
        pixels: null, // no tiene píxeles propios
      };
    }

    function createDefaultFrame() {
      return { layers: [createEmptyLayer('Capa 1')] };
    }

    function clonePixels(pixels) {
      return pixels.map(row => [...row]);
    }

    function cloneFrame(frame) {
      return {
        layers: frame.layers.map(layer => {
          if (layer.type === 'adjustment') {
            return { ...layer, params: { ...layer.params } };
          } else {
            return {
              name: layer.name + (layer.name.match(/ copia$/) ? '' : ' copia'),
              visible: layer.visible,
              pixels: clonePixels(layer.pixels),
              type: 'normal'
            };
          }
        })
      };
    }

    function getActiveLayer() {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) return null;
      return frame.layers[state.currentLayerIndex] || null;
    }

    function getPixel(row, col) {
      const layer = getActiveLayer();
      if (!layer || layer.type === 'adjustment') return null;
      if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return null;
      return layer.pixels[row][col];
    }

    function setPixel(row, col, color) {
      const layer = getActiveLayer();
      if (!layer || layer.type === 'adjustment') return;
      if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return;
      layer.pixels[row][col] = color;
    }

    // Dibujar con tamaño de pincel (cuadrado centrado)
    function drawBrush(row, col, color) {
      const half = Math.floor(state.brushSize / 2);
      for (let dr = -half; dr <= half; dr++) {
        for (let dc = -half; dc <= half; dc++) {
          const r = row + dr, c = col + dc;
          if (state.brushSize % 2 === 0) {
            if (dr === -half && dc === -half) continue;
          }
          setPixel(r, c, color);
          // Simetría horizontal
          if (state.symmetryH) {
            const symR = row - dr;
            setPixel(symR, c, color);
          }
          // Simetría vertical
          if (state.symmetryV) {
            const symC = col - dc;
            setPixel(r, symC, color);
          }
          if (state.symmetryH && state.symmetryV) {
            const symR = row - dr;
            const symC = col - dc;
            setPixel(symR, symC, color);
          }
        }
      }
    }

    // Interpolación de líneas (algoritmo de Bresenham simplificado)
    function drawLine(r1, c1, r2, c2, color) {
      const dr = Math.abs(r2 - r1);
      const dc = Math.abs(c2 - c1);
      const steps = Math.max(dr, dc);
      if (steps === 0) {
        drawBrush(r1, c1, color);
        return;
      }
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        const r = Math.round(r1 + (r2 - r1) * t);
        const c = Math.round(c1 + (c2 - c1) * t);
        drawBrush(r, c, color);
      }
    }

    // -------- HISTORIAL --------
    function saveHistory() {
      const snapshot = state.frames.map(frame => cloneFrame(frame));
      if (state.historyIndex < state.history.length - 1) {
        state.history = state.history.slice(0, state.historyIndex + 1);
      }
      state.history.push(snapshot);
      if (state.history.length > state.maxHistory) {
        state.history.shift();
      }
      state.historyIndex = state.history.length - 1;
    }

    function undo() {
      if (state.historyIndex <= 0) return;
      state.historyIndex--;
      restoreSnapshot(state.history[state.historyIndex]);
    }

    function redo() {
      if (state.historyIndex >= state.history.length - 1) return;
      state.historyIndex++;
      restoreSnapshot(state.history[state.historyIndex]);
    }

    function restoreSnapshot(snapshot) {
      state.frames = snapshot.map(frame => cloneFrame(frame));
      if (state.currentFrameIndex >= state.frames.length) state.currentFrameIndex = state.frames.length - 1;
      if (state.currentLayerIndex >= state.frames[state.currentFrameIndex].layers.length) {
        state.currentLayerIndex = state.frames[state.currentFrameIndex].layers.length - 1;
      }
      renderAll();
    }

    // -------- RENDERIZADO (con transparencia y capas de ajuste) --------
    function renderCanvas() {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) return;

      const w = canvas.width, h = canvas.height;
      // Fondo de cuadrícula
      const tileSize = 8;
      ctx.fillStyle = '#333';
      ctx.fillRect(0, 0, w, h);
      ctx.fillStyle = '#555';
      for (let y = 0; y < h; y += tileSize) {
        for (let x = 0; x < w; x += tileSize) {
          if ((Math.floor(x/tileSize) + Math.floor(y/tileSize)) % 2 === 0) {
            ctx.fillRect(x, y, tileSize, tileSize);
          }
        }
      }

      // Composición con capas de ajuste
      const imageData = ctx.createImageData(SIZE, SIZE);
      const data = imageData.data;
      // Inicializar con transparente
      for (let i = 0; i < data.length; i += 4) {
        data[i+3] = 0;
      }

      // Recorremos capas en orden, aplicando ajustes sobre el acumulado
      let composite = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));

      for (const layer of frame.layers) {
        if (!layer.visible) continue;

        if (layer.type === 'normal') {
          // Copiar píxeles de la capa normal al composite (solo si no hay ya un color)
          for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
              const color = layer.pixels[r][c];
              if (color !== null && composite[r][c] === null) {
                composite[r][c] = color;
              }
            }
          }
        } else if (layer.type === 'adjustment') {
          // Aplicar ajuste sobre el composite actual
          composite = applyAdjustment(composite, layer.adjustmentType, layer.params);
        }
      }

      // Rellenar ImageData con el composite
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const color = composite[r][c];
          if (color === null) continue;
          const idx = (r * SIZE + c) * 4;
          const [R, G, B] = hexToRgb(color);
          data[idx] = R;
          data[idx+1] = G;
          data[idx+2] = B;
          data[idx+3] = 255;
        }
      }
      ctx.putImageData(imageData, 0, 0);

      // Dibujar selección si existe
      if (state.selection) {
        const { startRow, startCol, endRow, endCol } = state.selection;
        const r1 = Math.min(startRow, endRow);
        const r2 = Math.max(startRow, endRow);
        const c1 = Math.min(startCol, endCol);
        const c2 = Math.max(startCol, endCol);
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 2;
        ctx.strokeRect(c1, r1, c2-c1+1, r2-r1+1);
      }
    }

    // Aplicar ajuste a una matriz de píxeles (cada píxel es un string hex o null)
    function applyAdjustment(pixels, type, params) {
      const result = pixels.map(row => [...row]);
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          const color = result[r][c];
          if (color === null) continue;
          let [R, G, B] = hexToRgb(color);
          switch (type) {
            case 'brightness': {
              const amount = params.amount || 30;
              R = Math.min(255, Math.max(0, R + amount));
              G = Math.min(255, Math.max(0, G + amount));
              B = Math.min(255, Math.max(0, B + amount));
              break;
            }
            case 'contrast': {
              const factor = (params.factor || 1.5);
              const avg = 128;
              R = Math.min(255, Math.max(0, avg + (R - avg) * factor));
              G = Math.min(255, Math.max(0, avg + (G - avg) * factor));
              B = Math.min(255, Math.max(0, avg + (B - avg) * factor));
              break;
            }
            case 'saturation': {
              const sat = (params.saturation || 1.5);
              const gray = 0.299 * R + 0.587 * G + 0.114 * B;
              R = Math.min(255, Math.max(0, gray + (R - gray) * sat));
              G = Math.min(255, Math.max(0, gray + (G - gray) * sat));
              B = Math.min(255, Math.max(0, gray + (B - gray) * sat));
              break;
            }
            case 'grayscale': {
              const gray = 0.299 * R + 0.587 * G + 0.114 * B;
              R = gray; G = gray; B = gray;
              break;
            }
          }
          result[r][c] = rgbToHex(Math.round(R), Math.round(G), Math.round(B));
        }
      }
      return result;
    }

    function hexToRgb(hex) {
      const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? [
        parseInt(result[1], 16),
        parseInt(result[2], 16),
        parseInt(result[3], 16)
      ] : [0,0,0];
    }

    function rgbToHex(r,g,b) {
      return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
    }

    function renderAll() {
      renderCanvas();
      renderLayers();
      renderTimeline();
      updateInfo();
    }

    // -------- CAPAS UI --------
    function renderLayers() {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) { layerListEl.innerHTML = ''; return; }
      let html = '';
      frame.layers.forEach((layer, idx) => {
        const active = idx === state.currentLayerIndex ? 'active' : '';
        const vis = layer.visible ? '👁️' : '🚫';
        const typeLabel = layer.type === 'adjustment' ? ` [${layer.adjustmentType}]` : '';
        html += `
          <div class="layer-item ${active}" data-index="${idx}">
            <span class="layer-vis" data-action="toggleVis">${vis}</span>
            <span class="layer-name">${layer.name}${typeLabel}</span>
            <span class="layer-del" data-action="delLayer">✕</span>
          </div>
        `;
      });
      layerListEl.innerHTML = html;
      layerListEl.querySelectorAll('.layer-item').forEach(el => {
        const idx = parseInt(el.dataset.index);
        el.addEventListener('click', (e) => {
          if (e.target.closest('.layer-del') || e.target.closest('.layer-vis')) return;
          state.currentLayerIndex = idx;
          renderAll();
        });
        const visBtn = el.querySelector('.layer-vis');
        if (visBtn) {
          visBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            const layer = frame.layers[idx];
            if (layer) layer.visible = !layer.visible;
            renderAll();
          });
        }
        const delBtn = el.querySelector('.layer-del');
        if (delBtn) {
          delBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteLayer(idx);
          });
        }
      });
    }

    // -------- TIMELINE UI --------
    function renderTimeline() {
      if (!state.frames.length) { timelineEl.innerHTML = ''; return; }
      let html = '';
      state.frames.forEach((frame, idx) => {
        const active = idx === state.currentFrameIndex ? 'active' : '';
        html += `
          <div class="frame-thumb ${active}" data-index="${idx}">
            <canvas width="32" height="32" data-frameidx="${idx}"></canvas>
            <div class="frame-label">#${idx+1} <span class="frame-del" data-action="delFrame">✕</span></div>
          </div>
        `;
      });
      timelineEl.innerHTML = html;

      timelineEl.querySelectorAll('.frame-thumb').forEach(el => {
        const idx = parseInt(el.dataset.index);
        const miniCanvas = el.querySelector('canvas');
        if (miniCanvas) {
          const miniCtx = miniCanvas.getContext('2d');
          const frame = state.frames[idx];
          if (frame) {
            // Fondo de cuadrícula
            const w = 32, h = 32;
            const tile = 4;
            miniCtx.fillStyle = '#333';
            miniCtx.fillRect(0,0,w,h);
            miniCtx.fillStyle = '#555';
            for (let y=0; y<h; y+=tile) {
              for (let x=0; x<w; x+=tile) {
                if ((Math.floor(x/tile)+Math.floor(y/tile))%2===0) miniCtx.fillRect(x,y,tile,tile);
              }
            }
            // Composición rápida
            const imageData = miniCtx.createImageData(32,32);
            const data = imageData.data;
            for (let i=0; i<data.length; i+=4) data[i+3]=0;
            let composite = Array.from({ length: 32 }, () => Array(32).fill(null));
            for (const layer of frame.layers) {
              if (!layer.visible) continue;
              if (layer.type === 'normal') {
                for (let r=0; r<32; r++) {
                  for (let c=0; c<32; c++) {
                    const color = layer.pixels[r][c];
                    if (color !== null && composite[r][c] === null) composite[r][c] = color;
                  }
                }
              } else {
                composite = applyAdjustment(composite, layer.adjustmentType, layer.params);
              }
            }
            for (let r=0; r<32; r++) {
              for (let c=0; c<32; c++) {
                const color = composite[r][c];
                if (color === null) continue;
                const idx2 = (r*32+c)*4;
                const [R,G,B] = hexToRgb(color);
                data[idx2] = R; data[idx2+1]=G; data[idx2+2]=B; data[idx2+3]=255;
              }
            }
            miniCtx.putImageData(imageData,0,0);
          }
        }
        el.addEventListener('click', (e) => {
          if (e.target.closest('.frame-del')) return;
          state.currentFrameIndex = idx;
          state.currentLayerIndex = 0;
          renderAll();
        });
        const del = el.querySelector('.frame-del');
        if (del) {
          del.addEventListener('click', (e) => {
            e.stopPropagation();
            deleteFrame(idx);
          });
        }
      });
    }

    // -------- MANIPULACIÓN DE FRAMES --------
    function addFrame() {
      const newFrame = createDefaultFrame();
      state.frames.push(newFrame);
      state.currentFrameIndex = state.frames.length - 1;
      state.currentLayerIndex = 0;
      saveHistory();
      renderAll();
    }

    function duplicateFrame() {
      if (!state.frames.length) return;
      const src = state.frames[state.currentFrameIndex];
      const newFrame = cloneFrame(src);
      state.frames.push(newFrame);
      state.currentFrameIndex = state.frames.length - 1;
      state.currentLayerIndex = 0;
      saveHistory();
      renderAll();
    }

    function deleteFrame(index) {
      if (state.frames.length <= 1) return;
      state.frames.splice(index, 1);
      if (state.currentFrameIndex >= state.frames.length) {
        state.currentFrameIndex = state.frames.length - 1;
      }
      if (state.currentLayerIndex >= state.frames[state.currentFrameIndex].layers.length) {
        state.currentLayerIndex = state.frames[state.currentFrameIndex].layers.length - 1;
      }
      saveHistory();
      renderAll();
    }

    // -------- MANIPULACIÓN DE CAPAS --------
    function addLayer() {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) return;
      const name = `Capa ${frame.layers.filter(l => l.type === 'normal').length + 1}`;
      frame.layers.push(createEmptyLayer(name));
      state.currentLayerIndex = frame.layers.length - 1;
      saveHistory();
      renderAll();
    }

    function addAdjustmentLayer(type) {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) return;
      const layer = createAdjustmentLayer(type);
      // Parámetros por defecto
      if (type === 'brightness') layer.params = { amount: 30 };
      else if (type === 'contrast') layer.params = { factor: 1.5 };
      else if (type === 'saturation') layer.params = { saturation: 1.5 };
      else if (type === 'grayscale') layer.params = {};
      frame.layers.push(layer);
      state.currentLayerIndex = frame.layers.length - 1;
      saveHistory();
      renderAll();
    }

    function duplicateLayer() {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame || !frame.layers.length) return;
      const src = frame.layers[state.currentLayerIndex];
      let newLayer;
      if (src.type === 'adjustment') {
        newLayer = { ...src, name: src.name + ' copia', params: { ...src.params } };
      } else {
        const newPixels = clonePixels(src.pixels);
        newLayer = { name: src.name + ' copia', visible: src.visible, pixels: newPixels, type: 'normal' };
      }
      frame.layers.splice(state.currentLayerIndex + 1, 0, newLayer);
      state.currentLayerIndex = state.currentLayerIndex + 1;
      saveHistory();
      renderAll();
    }

    function deleteLayer(index) {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame || frame.layers.length <= 1) return;
      frame.layers.splice(index, 1);
      if (state.currentLayerIndex >= frame.layers.length) {
        state.currentLayerIndex = frame.layers.length - 1;
      }
      saveHistory();
      renderAll();
    }

    function mergeVisibleLayers() {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) return;
      const visible = frame.layers.filter(l => l.visible && l.type === 'normal');
      if (visible.length <= 1) return;
      const merged = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      for (const layer of visible) {
        for (let r=0; r<SIZE; r++) {
          for (let c=0; c<SIZE; c++) {
            const color = layer.pixels[r][c];
            if (color !== null) merged[r][c] = color;
          }
        }
      }
      // Conservar capas de ajuste y las normales no visibles
      const newLayers = frame.layers.filter(l => !l.visible || l.type === 'adjustment');
      newLayers.push({ name: 'Fusionada', visible: true, pixels: merged, type: 'normal' });
      frame.layers = newLayers;
      state.currentLayerIndex = frame.layers.length - 1;
      saveHistory();
      renderAll();
    }

    function moveLayerUp() {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) return;
      const idx = state.currentLayerIndex;
      if (idx >= frame.layers.length - 1) return;
      [frame.layers[idx], frame.layers[idx+1]] = [frame.layers[idx+1], frame.layers[idx]];
      state.currentLayerIndex = idx + 1;
      renderAll();
    }

    function moveLayerDown() {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) return;
      const idx = state.currentLayerIndex;
      if (idx <= 0) return;
      [frame.layers[idx], frame.layers[idx-1]] = [frame.layers[idx-1], frame.layers[idx]];
      state.currentLayerIndex = idx - 1;
      renderAll();
    }

    // -------- HERRAMIENTAS DE DIBUJO --------
    function floodFill(row, col, targetColor, fillColor) {
      const layer = getActiveLayer();
      if (!layer || layer.type === 'adjustment') return;
      if (targetColor === fillColor) return;
      const pixels = layer.pixels;
      const stack = [[row, col]];
      const visited = new Set();
      while (stack.length) {
        const [r, c] = stack.pop();
        const key = r + ',' + c;
        if (visited.has(key)) continue;
        visited.add(key);
        if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) continue;
        if (pixels[r][c] !== targetColor) continue;
        pixels[r][c] = fillColor;
        stack.push([r+1, c], [r-1, c], [r, c+1], [r, c-1]);
      }
    }

    // -------- SELECCIÓN Y ARRASTRE --------
    function startSelection(row, col) {
      state.selection = { startRow: row, startCol: col, endRow: row, endCol: col };
      state.isDraggingSelection = false;
    }

    function updateSelection(row, col) {
      if (!state.selection) return;
      state.selection.endRow = Math.min(Math.max(row, 0), SIZE-1);
      state.selection.endCol = Math.min(Math.max(col, 0), SIZE-1);
      renderCanvas();
      // Dibujar rectángulo de selección
      const { startRow, startCol, endRow, endCol } = state.selection;
      const r1 = Math.min(startRow, endRow);
      const r2 = Math.max(startRow, endRow);
      const c1 = Math.min(startCol, endCol);
      const c2 = Math.max(startCol, endCol);
      ctx.strokeStyle = '#00ffff';
      ctx.lineWidth = 2;
      ctx.strokeRect(c1, r1, c2-c1+1, r2-r1+1);
    }

    function finishSelection() {
      if (!state.selection) return;
      // Guardar los píxeles seleccionados (desde la capa activa, o composite?)
      // Usaremos la capa activa si es normal, sino no se puede seleccionar.
      const layer = getActiveLayer();
      if (!layer || layer.type === 'adjustment') {
        state.selection = null;
        renderAll();
        return;
      }
      const { startRow, startCol, endRow, endCol } = state.selection;
      const r1 = Math.min(startRow, endRow);
      const r2 = Math.max(startRow, endRow);
      const c1 = Math.min(startCol, endCol);
      const c2 = Math.max(startCol, endCol);
      const w = c2 - c1 + 1;
      const h = r2 - r1 + 1;
      const pixels = Array.from({ length: h }, (_, i) =>
        Array.from({ length: w }, (_, j) => layer.pixels[r1 + i][c1 + j])
      );
      state.clipboard = { pixels, row: r1, col: c1, w, h };
      // No limpiar la selección, la dejamos visible para poder arrastrar
      // Pero añadimos un flag para saber que ya está fija
      state.selection.fixed = true;
      renderAll();
    }

    // Mover selección (arrastrar)
    function startDragSelection(row, col) {
      if (!state.selection) return false;
      const { startRow, startCol, endRow, endCol } = state.selection;
      const r1 = Math.min(startRow, endRow);
      const r2 = Math.max(startRow, endRow);
      const c1 = Math.min(startCol, endCol);
      const c2 = Math.max(startCol, endCol);
      if (row >= r1 && row <= r2 && col >= c1 && col <= c2) {
        state.isDraggingSelection = true;
        state.dragOffset = { row: row - r1, col: col - c1 };
        return true;
      }
      return false;
    }

    function dragSelection(row, col) {
      if (!state.isDraggingSelection || !state.selection || !state.clipboard) return;
      const { startRow, startCol, endRow, endCol } = state.selection;
      const r1 = Math.min(startRow, endRow);
      const r2 = Math.max(startRow, endRow);
      const c1 = Math.min(startCol, endCol);
      const c2 = Math.max(startCol, endCol);
      const w = c2 - c1 + 1;
      const h = r2 - r1 + 1;
      // Nueva posición (esquina superior izquierda)
      let newRow = row - state.dragOffset.row;
      let newCol = col - state.dragOffset.col;
      // Limitar dentro del canvas
      newRow = Math.min(Math.max(newRow, 0), SIZE - h);
      newCol = Math.min(Math.max(newCol, 0), SIZE - w);
      // Borrar área anterior en la capa activa (si es normal)
      const layer = getActiveLayer();
      if (!layer || layer.type === 'adjustment') return;
      // Poner transparente en el área anterior
      for (let r = r1; r <= r2; r++) {
        for (let c = c1; c <= c2; c++) {
          layer.pixels[r][c] = null;
        }
      }
      // Copiar los píxeles del portapapeles en la nueva posición
      for (let r = 0; r < h; r++) {
        for (let c = 0; c < w; c++) {
          const srcColor = state.clipboard.pixels[r][c];
          if (srcColor !== null) {
            const destR = newRow + r;
            const destC = newCol + c;
            if (destR >= 0 && destR < SIZE && destC >= 0 && destC < SIZE) {
              layer.pixels[destR][destC] = srcColor;
            }
          }
        }
      }
      // Actualizar selección y portapapeles con nueva posición
      state.selection.startRow = newRow;
      state.selection.startCol = newCol;
      state.selection.endRow = newRow + h - 1;
      state.selection.endCol = newCol + w - 1;
      state.clipboard.row = newRow;
      state.clipboard.col = newCol;
      saveHistory();
      renderAll();
    }

    function endDragSelection() {
      state.isDraggingSelection = false;
      state.dragOffset = null;
    }

    // Copiar selección (ya está en clipboard)
    function copySelection() {
      if (!state.clipboard) return;
      // Ya está
    }

    // Pegar en nueva capa
    function pasteClipboard() {
      if (!state.clipboard) return;
      const { pixels, row, col, w, h } = state.clipboard;
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) return;
      const newLayer = createEmptyLayer('Pegado');
      for (let r = 0; r < h; r++) {
        for (let c = 0; c < w; c++) {
          const pr = row + r, pc = col + c;
          if (pr < 0 || pr >= SIZE || pc < 0 || pc >= SIZE) continue;
          newLayer.pixels[pr][pc] = pixels[r][c];
        }
      }
      frame.layers.push(newLayer);
      state.currentLayerIndex = frame.layers.length - 1;
      saveHistory();
      renderAll();
    }

    function clearSelection() {
      state.selection = null;
      state.isDraggingSelection = false;
      renderAll();
    }

    // -------- EVENTOS DEL CANVAS --------
    function getGridCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      const col = Math.floor(x);
      const row = Math.floor(y);
      return { row, col };
    }

    let isDrawing = false;
    let lastPenPoint = null;

    function handleCanvasDown(e) {
      const { row, col } = getGridCoords(e);
      if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return;
      const tool = state.tool;

      // Si hay selección y estamos dentro, iniciar arrastre
      if (tool === 'select' && state.selection && state.selection.fixed) {
        if (startDragSelection(row, col)) {
          return;
        }
      }

      if (tool === 'select') {
        startSelection(row, col);
        return;
      }

      if (tool === 'pen') {
        state.isPenDrawing = true;
        lastPenPoint = { row, col };
        const color = state.color;
        drawBrush(row, col, color);
        saveHistory();
        renderAll();
        return;
      }

      if (tool === 'pencil' || tool === 'eraser') {
        isDrawing = true;
        const color = tool === 'pencil' ? state.color : null;
        drawBrush(row, col, color);
        saveHistory();
        renderAll();
      } else if (tool === 'fill') {
        const target = getPixel(row, col);
        if (target !== state.color) {
          floodFill(row, col, target, state.color);
          saveHistory();
          renderAll();
        }
      } else if (tool === 'picker') {
        const color = getPixel(row, col);
        if (color !== null) {
          state.color = color;
          customColorInput.value = color;
          updatePaletteSelection();
          renderAll();
        }
      }
    }

    function handleCanvasMove(e) {
      const { row, col } = getGridCoords(e);
      if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) {
        infoCoords.textContent = '(--,-- )';
        return;
      }
      infoCoords.textContent = `(${row},${col})`;
      const color = getPixel(row, col);
      infoColor.textContent = color || 'transparente';
      infoColor.style.color = color || '#888';

      // Arrastre de selección
      if (state.isDraggingSelection) {
        dragSelection(row, col);
        return;
      }

      // Actualizar selección si está en curso
      if (state.tool === 'select' && state.selection && !state.selection.fixed) {
        updateSelection(row, col);
        return;
      }

      // Lapicera: dibujo continuo
      if (state.isPenDrawing && state.tool === 'pen') {
        if (lastPenPoint) {
          drawLine(lastPenPoint.row, lastPenPoint.col, row, col, state.color);
          lastPenPoint = { row, col };
          saveHistory();
          renderAll();
        }
        return;
      }

      // Dibujo con lápiz/borrador si está presionado
      if (isDrawing && (state.tool === 'pencil' || state.tool === 'eraser')) {
        const color2 = state.tool === 'pencil' ? state.color : null;
        drawBrush(row, col, color2);
        saveHistory();
        renderAll();
      }
    }

    function handleCanvasUp(e) {
      if (state.tool === 'select' && state.selection && !state.selection.fixed) {
        finishSelection();
      }
      if (state.isDraggingSelection) {
        endDragSelection();
      }
      isDrawing = false;
      state.isPenDrawing = false;
      lastPenPoint = null;
    }

    // -------- PALETA --------
    function renderPalette() {
      let html = '';
      PALETTE.forEach(c => {
        const sel = c === state.color ? 'selected' : '';
        html += `<div class="color-swatch ${sel}" style="background:${c}" data-color="${c}"></div>`;
      });
      paletteEl.innerHTML = html;
      paletteEl.querySelectorAll('.color-swatch').forEach(el => {
        el.addEventListener('click', () => {
          state.color = el.dataset.color;
          customColorInput.value = state.color;
          updatePaletteSelection();
          renderAll();
        });
      });
    }

    function updatePaletteSelection() {
      paletteEl.querySelectorAll('.color-swatch').forEach(el => {
        el.classList.toggle('selected', el.dataset.color === state.color);
      });
    }

    // -------- HERRAMIENTAS UI --------
    function setupTools() {
      document.querySelectorAll('#toolGroup button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('#toolGroup button').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          state.tool = btn.dataset.tool;
          if (state.tool !== 'select') {
            state.selection = null;
            state.isDraggingSelection = false;
          }
          renderAll();
        });
      });
    }

    // -------- TAMAÑO PINCEL --------
    function setupBrushSize() {
      document.querySelectorAll('.brush-size button').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.brush-size button').forEach(b => b.classList.remove('active-brush'));
          btn.classList.add('active-brush');
          state.brushSize = parseInt(btn.dataset.size);
        });
      });
    }

    // -------- SIMETRÍA --------
    symmetryHCheck.addEventListener('change', () => {
      state.symmetryH = symmetryHCheck.checked;
    });
    symmetryVCheck.addEventListener('change', () => {
      state.symmetryV = symmetryVCheck.checked;
    });

    // -------- EXPORTAR PNG (con transparencia) --------
    function exportPNG() {
      const frame = state.frames[state.currentFrameIndex];
      if (!frame) return;
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = SIZE;
      tempCanvas.height = SIZE;
      const tCtx = tempCanvas.getContext('2d');
      const imageData = tCtx.createImageData(SIZE, SIZE);
      const data = imageData.data;
      for (let i = 0; i < data.length; i += 4) data[i+3] = 0;
      let composite = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
      for (const layer of frame.layers) {
        if (!layer.visible) continue;
        if (layer.type === 'normal') {
          for (let r=0; r<SIZE; r++) {
            for (let c=0; c<SIZE; c++) {
              const color = layer.pixels[r][c];
              if (color !== null && composite[r][c] === null) composite[r][c] = color;
            }
          }
        } else {
          composite = applyAdjustment(composite, layer.adjustmentType, layer.params);
        }
      }
      for (let r=0; r<SIZE; r++) {
        for (let c=0; c<SIZE; c++) {
          const color = composite[r][c];
          if (color === null) continue;
          const idx = (r*SIZE+c)*4;
          const [R,G,B] = hexToRgb(color);
          data[idx] = R; data[idx+1]=G; data[idx+2]=B; data[idx+3]=255;
        }
      }
      tCtx.putImageData(imageData, 0, 0);
      const link = document.createElement('a');
      link.download = `pixelforge_frame_${state.currentFrameIndex+1}.png`;
      link.href = tempCanvas.toDataURL('image/png');
      link.click();
    }

    // -------- EXPORTAR GIF (con transparencia) --------
    function exportGIF() {
      if (typeof GIF === 'undefined') {
        alert('Librería gif.js no cargada.');
        return;
      }
      if (!state.frames.length) return;
      const gif = new GIF({ workers: 2, quality: 10, width: SIZE, height: SIZE });
      state.frames.forEach((frame) => {
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = SIZE;
        tempCanvas.height = SIZE;
        const tCtx = tempCanvas.getContext('2d');
        const imageData = tCtx.createImageData(SIZE, SIZE);
        const data = imageData.data;
        for (let i=0; i<data.length; i+=4) data[i+3]=0;
        let composite = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
        for (const layer of frame.layers) {
          if (!layer.visible) continue;
          if (layer.type === 'normal') {
            for (let r=0; r<SIZE; r++) {
              for (let c=0; c<SIZE; c++) {
                const color = layer.pixels[r][c];
                if (color !== null && composite[r][c] === null) composite[r][c] = color;
              }
            }
          } else {
            composite = applyAdjustment(composite, layer.adjustmentType, layer.params);
          }
        }
        for (let r=0; r<SIZE; r++) {
          for (let c=0; c<SIZE; c++) {
            const color = composite[r][c];
            if (color === null) continue;
            const idx = (r*SIZE+c)*4;
            const [R,G,B] = hexToRgb(color);
            data[idx] = R; data[idx+1]=G; data[idx+2]=B; data[idx+3]=255;
          }
        }
        tCtx.putImageData(imageData, 0, 0);
        gif.addFrame(tempCanvas, { copy: true, delay: state.speed });
      });
      gif.on('finished', (blob) => {
        const link = document.createElement('a');
        link.download = 'pixelforge_animation.gif';
        link.href = URL.createObjectURL(blob);
        link.click();
      });
      gif.render();
    }

    // -------- EXPORTAR SPRITE SHEET --------
    function exportSpriteSheet() {
      if (!state.frames.length) return;
      const cols = parseInt(spriteColsInput.value) || 4;
      const rows = Math.ceil(state.frames.length / cols);
      const spriteSize = SIZE;
      const sheetCanvas = document.createElement('canvas');
      sheetCanvas.width = cols * spriteSize;
      sheetCanvas.height = rows * spriteSize;
      const sCtx = sheetCanvas.getContext('2d');

      state.frames.forEach((frame, idx) => {
        const col = idx % cols;
        const row = Math.floor(idx / cols);
        // Renderizar frame en un canvas temporal
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = SIZE;
        tempCanvas.height = SIZE;
        const tCtx = tempCanvas.getContext('2d');
        const imageData = tCtx.createImageData(SIZE, SIZE);
        const data = imageData.data;
        for (let i=0; i<data.length; i+=4) data[i+3]=0;
        let composite = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
        for (const layer of frame.layers) {
          if (!layer.visible) continue;
          if (layer.type === 'normal') {
            for (let r=0; r<SIZE; r++) {
              for (let c=0; c<SIZE; c++) {
                const color = layer.pixels[r][c];
                if (color !== null && composite[r][c] === null) composite[r][c] = color;
              }
            }
          } else {
            composite = applyAdjustment(composite, layer.adjustmentType, layer.params);
          }
        }
        for (let r=0; r<SIZE; r++) {
          for (let c=0; c<SIZE; c++) {
            const color = composite[r][c];
            if (color === null) continue;
            const idx2 = (r*SIZE+c)*4;
            const [R,G,B] = hexToRgb(color);
            data[idx2] = R; data[idx2+1]=G; data[idx2+2]=B; data[idx2+3]=255;
          }
        }
        tCtx.putImageData(imageData, 0, 0);
        // Dibujar en el sprite sheet
        sCtx.drawImage(tempCanvas, col * spriteSize, row * spriteSize);
      });

      const link = document.createElement('a');
      link.download = 'pixelforge_sprite_sheet.png';
      link.href = sheetCanvas.toDataURL('image/png');
      link.click();
    }

    // -------- IMPORTAR IMAGEN --------
    function importImage(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const frame = state.frames[state.currentFrameIndex];
          if (!frame) return;
          const layer = getActiveLayer();
          if (!layer || layer.type === 'adjustment') return;
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = SIZE;
          tempCanvas.height = SIZE;
          const tCtx = tempCanvas.getContext('2d');
          tCtx.imageSmoothingEnabled = false;
          tCtx.drawImage(img, 0, 0, SIZE, SIZE);
          const imageData = tCtx.getImageData(0, 0, SIZE, SIZE);
          const data = imageData.data;
          const pixels = layer.pixels;
          for (let r=0; r<SIZE; r++) {
            for (let c=0; c<SIZE; c++) {
              const idx = (r*SIZE+c)*4;
              const R = data[idx], G = data[idx+1], B = data[idx+2], A = data[idx+3];
              if (A < 128) {
                pixels[r][c] = null;
              } else {
                pixels[r][c] = rgbToHex(R,G,B);
              }
            }
          }
          saveHistory();
          renderAll();
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // -------- GUARDAR / ABRIR PROYECTO (JSON) --------
    function saveProject() {
      const data = {
        version: '2.0',
        frames: state.frames.map(frame => ({
          layers: frame.layers.map(layer => {
            if (layer.type === 'adjustment') {
              return {
                name: layer.name,
                visible: layer.visible,
                type: 'adjustment',
                adjustmentType: layer.adjustmentType,
                params: layer.params
              };
            } else {
              return {
                name: layer.name,
                visible: layer.visible,
                type: 'normal',
                pixels: layer.pixels
              };
            }
          })
        }))
      };
      const json = JSON.stringify(data);
      const blob = new Blob([json], { type: 'application/json' });
      const link = document.createElement('a');
      link.download = 'pixelforge_project.json';
      link.href = URL.createObjectURL(blob);
      link.click();
    }

    function loadProject(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          if (!data.frames || !data.frames.length) throw new Error('Formato inválido');
          state.frames = data.frames.map(frame => ({
            layers: frame.layers.map(layer => {
              if (layer.type === 'adjustment') {
                return {
                  name: layer.name || 'Ajuste',
                  visible: layer.visible !== undefined ? layer.visible : true,
                  type: 'adjustment',
                  adjustmentType: layer.adjustmentType || 'brightness',
                  params: layer.params || {}
                };
              } else {
                return {
                  name: layer.name || 'Capa',
                  visible: layer.visible !== undefined ? layer.visible : true,
                  type: 'normal',
                  pixels: layer.pixels || Array.from({ length: SIZE }, () => Array(SIZE).fill(null))
                };
              }
            })
          }));
          state.currentFrameIndex = 0;
          state.currentLayerIndex = 0;
          saveHistory();
          renderAll();
        } catch (err) {
          alert('Error al cargar el proyecto: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // -------- REPRODUCIR ANIMACIÓN --------
    function togglePlay() {
      if (state.playing) {
        stopPlay();
        return;
      }
      if (state.frames.length < 2) return;
      state.playing = true;
      document.getElementById('playBtn').textContent = '⏹ Detener';
      let idx = state.currentFrameIndex;
      state.playTimer = setInterval(() => {
        idx = (idx + 1) % state.frames.length;
        state.currentFrameIndex = idx;
        state.currentLayerIndex = 0;
        renderAll();
      }, state.speed);
    }

    function stopPlay() {
      state.playing = false;
      if (state.playTimer) {
        clearInterval(state.playTimer);
        state.playTimer = null;
      }
      document.getElementById('playBtn').textContent = '▶️ Reproducir';
    }

    // -------- EFECTOS SOBRE CAPA ACTIVA (normal) --------
    function applyEffectToLayer(effect) {
      const layer = getActiveLayer();
      if (!layer || layer.type === 'adjustment') return;
      const pixels = layer.pixels;
      let newPixels;

      switch (effect) {
        case 'scale2x': {
          newPixels = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
          for (let r=0; r<SIZE; r++) {
            for (let c=0; c<SIZE; c++) {
              const srcR = Math.floor(r/2), srcC = Math.floor(c/2);
              if (srcR < SIZE && srcC < SIZE) {
                newPixels[r][c] = pixels[srcR][srcC];
              }
            }
          }
          break;
        }
        case 'scaleHalf': {
          newPixels = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
          for (let r=0; r<SIZE; r++) {
            for (let c=0; c<SIZE; c++) {
              const srcR = Math.floor(r/2), srcC = Math.floor(c/2);
              if (srcR < SIZE/2 && srcC < SIZE/2) {
                newPixels[r][c] = pixels[srcR][srcC];
              }
            }
          }
          break;
        }
        case 'rot90': {
          newPixels = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
          for (let r=0; r<SIZE; r++) {
            for (let c=0; c<SIZE; c++) {
              newPixels[c][SIZE-1-r] = pixels[r][c];
            }
          }
          break;
        }
        case 'rot180': {
          newPixels = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
          for (let r=0; r<SIZE; r++) {
            for (let c=0; c<SIZE; c++) {
              newPixels[SIZE-1-r][SIZE-1-c] = pixels[r][c];
            }
          }
          break;
        }
        case 'rot270': {
          newPixels = Array.from({ length: SIZE }, () => Array(SIZE).fill(null));
          for (let r=0; r<SIZE; r++) {
            for (let c=0; c<SIZE; c++) {
              newPixels[SIZE-1-c][r] = pixels[r][c];
            }
          }
          break;
        }
        case 'flipH': {
          newPixels = pixels.map(row => [...row].reverse());
          break;
        }
        case 'flipV': {
          newPixels = [...pixels].reverse();
          break;
        }
        case 'invert': {
          newPixels = pixels.map(row => row.map(color => {
            if (color === null) return null;
            const [R,G,B] = hexToRgb(color);
            return rgbToHex(255-R, 255-G, 255-B);
          }));
          break;
        }
        default: return;
      }
      layer.pixels = newPixels;
      saveHistory();
      renderAll();
    }

    // -------- INFO --------
    function updateInfo() {
      // ya se actualiza en movimiento
    }

    // -------- INICIALIZACIÓN --------
    function init() {
      state.frames = [createDefaultFrame()];
      state.currentFrameIndex = 0;
      state.currentLayerIndex = 0;
      state.color = '#ff00ff';
      customColorInput.value = state.color;

      renderPalette();
      renderAll();

      // Eventos del canvas
      canvas.addEventListener('mousedown', handleCanvasDown);
      canvas.addEventListener('mousemove', handleCanvasMove);
      canvas.addEventListener('mouseup', handleCanvasUp);
      canvas.addEventListener('mouseleave', () => {
        infoCoords.textContent = '(--,-- )';
        isDrawing = false;
        state.isPenDrawing = false;
        lastPenPoint = null;
        if (state.isDraggingSelection) endDragSelection();
      });

      setupTools();
      setupBrushSize();

      // Color personalizado
      customColorInput.addEventListener('input', (e) => {
        state.color = e.target.value;
        updatePaletteSelection();
        renderAll();
      });

      // Capas
      document.getElementById('addLayerBtn').addEventListener('click', addLayer);
      document.getElementById('dupLayerBtn').addEventListener('click', duplicateLayer);
      document.getElementById('mergeLayerBtn').addEventListener('click', mergeVisibleLayers);
      document.getElementById('upLayerBtn').addEventListener('click', moveLayerUp);
      document.getElementById('downLayerBtn').addEventListener('click', moveLayerDown);

      // Capas de ajuste
      document.getElementById('adjBrightness').addEventListener('click', () => addAdjustmentLayer('brightness'));
      document.getElementById('adjContrast').addEventListener('click', () => addAdjustmentLayer('contrast'));
      document.getElementById('adjSaturation').addEventListener('click', () => addAdjustmentLayer('saturation'));
      document.getElementById('adjGrayscale').addEventListener('click', () => addAdjustmentLayer('grayscale'));

      // Frames
      document.getElementById('addFrameBtn').addEventListener('click', addFrame);
      document.getElementById('dupFrameBtn').addEventListener('click', duplicateFrame);
      document.getElementById('delFrameBtn').addEventListener('click', () => {
        deleteFrame(state.currentFrameIndex);
      });

      // Play
      document.getElementById('playBtn').addEventListener('click', togglePlay);

      // Velocidad
      speedSlider.addEventListener('input', (e) => {
        state.speed = parseInt(e.target.value);
        speedLabel.textContent = state.speed + 'ms';
        if (state.playing) {
          stopPlay();
          togglePlay();
        }
      });
      speedLabel.textContent = state.speed + 'ms';

      // Exportar
      document.getElementById('exportPngBtn').addEventListener('click', exportPNG);
      document.getElementById('exportGifBtn').addEventListener('click', exportGIF);
      document.getElementById('exportSpriteBtn').addEventListener('click', exportSpriteSheet);
      document.getElementById('exportSpriteBtn2').addEventListener('click', exportSpriteSheet);

      // Importar
      document.getElementById('importBtn').addEventListener('click', () => {
        document.getElementById('fileInput').click();
      });
      document.getElementById('fileInput').addEventListener('change', (e) => {
        if (e.target.files.length) {
          importImage(e.target.files[0]);
        }
        e.target.value = '';
      });

      // Guardar/Abrir proyecto
      document.getElementById('saveProjectBtn').addEventListener('click', saveProject);
      document.getElementById('loadProjectBtn').addEventListener('click', () => {
        document.getElementById('projectInput').click();
      });
      document.getElementById('projectInput').addEventListener('change', (e) => {
        if (e.target.files.length) {
          loadProject(e.target.files[0]);
        }
        e.target.value = '';
      });

      // Deshacer / Rehacer
      document.getElementById('undoBtn').addEventListener('click', undo);
      document.getElementById('redoBtn').addEventListener('click', redo);

      // Copiar / Pegar / Limpiar selección
      document.getElementById('copyBtn').addEventListener('click', copySelection);
      document.getElementById('pasteBtn').addEventListener('click', pasteClipboard);
      document.getElementById('clearSelectionBtn').addEventListener('click', clearSelection);

      // Efectos
      document.getElementById('effectScale2x').addEventListener('click', () => applyEffectToLayer('scale2x'));
      document.getElementById('effectScaleHalf').addEventListener('click', () => applyEffectToLayer('scaleHalf'));
      document.getElementById('effectRot90').addEventListener('click', () => applyEffectToLayer('rot90'));
      document.getElementById('effectRot180').addEventListener('click', () => applyEffectToLayer('rot180'));
      document.getElementById('effectRot270').addEventListener('click', () => applyEffectToLayer('rot270'));
      document.getElementById('effectFlipH').addEventListener('click', () => applyEffectToLayer('flipH'));
      document.getElementById('effectFlipV').addEventListener('click', () => applyEffectToLayer('flipV'));
      document.getElementById('effectInvert').addEventListener('click', () => applyEffectToLayer('invert'));

      // Guardar historial inicial
      saveHistory();

      canvas.addEventListener('contextmenu', (e) => e.preventDefault());
    }

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }

  })();
</script>
